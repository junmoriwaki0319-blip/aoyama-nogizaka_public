name: Update EDINET Data

on:
  schedule:
    # JST 8:00 = UTC 23:00 (前日)
    - cron: '0 23 * * *'
    # JST 16:00 = UTC 7:00
    - cron: '0 7 * * *'
    # JST 19:00 = UTC 10:00
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      backfill:
        description: 'バックフィル実行（過去540日分を取得）'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  fetch-edinet:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch EDINET data
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          BACKFILL: ${{ github.event.inputs.backfill == 'true' && '1' || '' }}
        run: python scripts/fetch_edinet.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: update EDINET reports $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
