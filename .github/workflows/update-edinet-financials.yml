name: Update EDINET Financials Cache

on:
  schedule:
    # 毎日 JST 18:00 = UTC 9:00
    - cron: '0 9 * * *'
  workflow_dispatch:  # 手動実行可能

permissions:
  contents: write

jobs:
  fetch-financials:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch EDINET financial data
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
        run: python scripts/fetch_edinet_financials.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/edinet-financials.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: update EDINET financials cache $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
