  <script>
    // GitHub PagesクリーンURL対応: /team → /team.html にリダイレクト
    (function(){
      var defined = ['team','privacy','risk-assessment','activist-dashboard','activist-screener','food-service','saas'];
      var path = location.pathname.replace(/\/$/,'');
      var slug = path.substring(1);
      if (defined.indexOf(slug) !== -1) {
        location.replace('/' + slug + '.html');
      }
    })();
  </script>

  <style>
    :root {
      --navy: #1a2d4f;
      --gold: #9b8b6e;
      --cream: #f8f7f5;
      --white: #ffffff;
      --text: #2c2c2c;
      --mid-gray: #e0dcd5;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--text);
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: var(--navy); height: 64px;
      display: flex; align-items: center;
    }
    .nav-inner {
      max-width: 1100px; margin: 0 auto; padding: 0 40px;
      width: 100%; display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { text-decoration: none; display: flex; flex-direction: column; gap: 1px; }
    .nav-logo-jp { font-family: 'Noto Serif JP', serif; font-size: 0.75rem; color: var(--mid-gray); letter-spacing: 0.1em; }
    .nav-logo-en { font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--white); letter-spacing: 0.08em; }
    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 120px 40px 80px;
      text-align: center;
    }
    .error-container { max-width: 560px; }
    .error-code {
      font-family: 'Cormorant Garamond', serif;
      font-size: 6rem; font-weight: 300;
      color: var(--gold); line-height: 1;
      margin-bottom: 16px;
    }
    .error-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 1.5rem; font-weight: 400;
      margin-bottom: 16px; color: var(--navy);
    }
    .error-message {
      font-size: 0.95rem; line-height: 1.8;
      color: #666; margin-bottom: 32px;
    }
    .back-link {
      display: inline-block;
      padding: 12px 32px;
      background: var(--navy);
      color: var(--white);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      border-radius: 2px;
      transition: background 0.2s;
    }
    .back-link:hover { background: #243b63; }
    footer {
      text-align: center; padding: 24px 40px;
      font-size: 0.75rem; color: #999;
      border-top: 1px solid var(--mid-gray);
    }
